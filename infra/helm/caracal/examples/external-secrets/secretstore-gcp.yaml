# External Secrets Operator ClusterSecretStore for Google Secret Manager.
# Provider authentication is the only GCP-specific surface; the ExternalSecret
# that consumes this store stays cloud-agnostic.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: caracal-gcp
spec:
  provider:
    gcpsm:
      projectID: my-gcp-project
      auth:
        # Prefer Workload Identity: bind this service account to a GCP service
        # account that holds roles/secretmanager.secretAccessor on caracal-*.
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: caracal-prod
          serviceAccountRef:
            name: caracal-external-secrets
            namespace: caracal
