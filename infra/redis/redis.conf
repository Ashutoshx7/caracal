# Redis 8 configuration for the Caracal message bus and ephemeral state.
# Auth password is supplied at startup via --requirepass.
#
# DB index allocation:
#   db 0: streams (audit.events, policy.invalidate, sessions.revoke, agents.lifecycle, providers.ratelimit)
#   db 1: rate-limit keys (rl:{zone_id}:{provider_id}:{user_id}) and step-up challenges (chal:{id})
#           Switch to db 1 in service config if independent eviction policy is required.

# Binds all container interfaces so peer services on the isolated caracalData
# network can connect; access is gated by protected-mode and --requirepass, and
# host port mapping is loopback-only. Untrusted-network deployments must front
# Redis with TLS (tls-port / tls-cert-file) or a TLS-terminating sidecar.
bind 0.0.0.0
port 6379
protected-mode yes

appendonly yes
appendfsync everysec
save 3600 1

# noeviction protects stream data from being silently dropped under memory pressure.
# Rate-limit keys in db 1 may use allkeys-lru if a separate eviction policy is needed.
maxmemory-policy noeviction

tcp-keepalive 60
timeout 0
