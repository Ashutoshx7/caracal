# LiteLLM proxy config: normalizes every provider to the OpenAI wire format for the Operator. No keys here; the gateway injects the sealed key as the bearer, the Caracal hook forwards it upstream, and drop_params strips model-specific quirks.

litellm_settings:
  drop_params: true
  callbacks: ["caracal_key_hook.caracal_key_hook"]

model_list:
  - model_name: gpt-5.4-mini
    litellm_params:
      model: azure/gpt-5.4-mini
      api_base: https://caracalaus.services.ai.azure.com
      api_version: "2024-10-21"
  - model_name: "*"
    litellm_params:
      model: openai/*
