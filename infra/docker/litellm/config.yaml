# Optional LiteLLM proxy: a stateless normalizer for upstreams that need parameter remapping (e.g. GPT-5 max_tokens). It stores no providers and no keys; a wildcard forwards any model and the Caracal hook supplies the sealed key. Used only when a provider's endpoint points here; direct endpoints bypass it entirely.

litellm_settings:
  drop_params: true
  callbacks: ["caracal_key_hook.caracal_key_hook"]

model_list:
  - model_name: "*"
    litellm_params:
      model: openai/*
