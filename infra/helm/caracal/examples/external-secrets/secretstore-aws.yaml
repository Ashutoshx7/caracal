# External Secrets Operator ClusterSecretStore for AWS Secrets Manager.
# Provider authentication is the only AWS-specific surface; the ExternalSecret
# that consumes this store stays cloud-agnostic.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: caracal-aws
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # Prefer IRSA: bind this service account to an IAM role that can read
        # the caracal/* secrets. No static keys in the cluster.
        jwt:
          serviceAccountRef:
            name: caracal-external-secrets
            namespace: caracal
