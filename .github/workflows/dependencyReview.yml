#
# Two-day dependency review of changes merged to main, covering vulnerabilities and license risk.

name: Dependency review

on:
  schedule:
    - cron: '0 6 */2 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    name: Review dependency changes
    if: github.repository == 'Garudex-Labs/caracal'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve review window
        id: window
        run: |
          set -euo pipefail
          head="$(git rev-parse HEAD)"
          base="$(git rev-list -1 --before='2 days ago' "$head" || true)"
          if [ -z "$base" ] || [ "$base" = "$head" ]; then
            echo "::notice::No commits in the last two days; skipping dependency review."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Reviewing dependency changes from ${base} to ${head}."
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "base=${base}" >> "$GITHUB_OUTPUT"
            echo "head=${head}" >> "$GITHUB_OUTPUT"
          fi

      - name: Review dependencies
        if: steps.window.outputs.run == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ steps.window.outputs.base }}
          head-ref: ${{ steps.window.outputs.head }}
          fail-on-severity: high
          deny-licenses: AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later, GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only, LGPL-2.0-or-later, LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later
