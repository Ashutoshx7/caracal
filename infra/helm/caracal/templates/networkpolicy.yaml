{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "caracal.fullname" . }}
  labels:
    {{- include "caracal.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "caracal.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "caracal.selectorLabels" . | nindent 14 }}
    - ports:
        - protocol: TCP
          port: {{ .Values.services.gateway.port }}
  egress:
    - {}
{{- end }}
