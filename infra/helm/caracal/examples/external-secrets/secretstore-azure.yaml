#
# External Secrets Operator ClusterSecretStore for Azure Key Vault.
# Provider authentication is the only Azure-specific surface; the ExternalSecret
# that consumes this store stays cloud-agnostic.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: caracal-azure
spec:
  provider:
    azurekv:
      vaultUrl: https://caracal-prod.vault.azure.net
      authType: WorkloadIdentity
      # Prefer Workload Identity: bind this service account to a managed identity
      # with the Key Vault Secrets User role on the caracal-* secrets.
      serviceAccountRef:
        name: caracal-external-secrets
        namespace: caracal
