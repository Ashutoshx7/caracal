name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "👀 First issue unlocked. Thanks for helping us spot things worth fixing."
        pr-message: "⚡ New contributor energy! Thanks for sending your first PR."
