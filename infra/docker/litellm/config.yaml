# LiteLLM proxy config: normalizes every provider to the OpenAI wire format for the Operator, so model-specific parameter quirks never reach Caracal. No keys live here; the gateway injects the key Caracal sealed, and LiteLLM forwards it to the upstream.

litellm_settings:
  # Drop or remap parameters a target model rejects (temperature/max_tokens for GPT-5), so one
  # canonical request works across current and future models without Caracal changes.
  drop_params: true

# Models match by name and route to a provider; the caller key the Caracal gateway injects from
# the sealed provider is forwarded upstream, so no provider key is stored here.
model_list:
  - model_name: "*"
    litellm_params:
      model: openai/*

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
